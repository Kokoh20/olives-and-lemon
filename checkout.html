<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Checkout - Mauiz Cafe</title>
    <link rel="icon" type="image/x-icon" href="assets/images/logo1-removebg-preview.png">
    <link rel="stylesheet" href="shop.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
  <body>
    <header class="store-header">
      <div class="store-top container">
        <div class="brand">
          <img src="assets/images/mauiz_cafe-removebg-preview.png" alt="Logo"/>
          <div class="brand-text">
            <h1>Order Checkout</h1>
            <p>Mauiz Cafe To Go</p>
          </div>
        </div>
      </div>
      <div class="canopy"></div>
      <div class="canopy canopy-alt"></div>
    </header>

    <main class="container" style="padding-bottom: 40px;">
      <nav style="margin: 16px 0; color:#666;"><a href="store.html" style="text-decoration:none;color:#666"><i class="fa-solid fa-angle-left"></i> Order Checkout</a></nav>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="d-flex align-items-center justify-content-between" style="margin-top:0">
            <h2 class="section-title m-0">Your Cart</h2>
            <button class="btn btn-link btn-sm text-muted" id="clearCartBtn" type="button">Clear</button>
          </div>
          <div id="orderList" class="vstack gap-3"></div>
          <p id="emptyCartMsg" class="text-muted small" style="display:none;">Your cart is empty. Add a drink to begin.</p>

          <div class="card mt-3">
            <div class="card-body">
              <div class="input-group input-group-lg">
                <input id="couponInput" type="text" class="form-control" placeholder="Get coupon code">
                <button class="btn btn-outline-primary" id="applyCoupon">Apply</button>
              </div>
              <div class="mt-3">
                <div class="d-flex justify-content-between"><div>Subtotal</div><div>₱ <span id="subtotal">0.00</span></div></div>
                <div class="d-flex justify-content-between"><div>Discount</div><div>- ₱ <span id="discount">0.00</span></div></div>
                <hr>
                <div class="d-flex justify-content-between fw-bold"><div>Amount Payable</div><div>₱ <span id="payable">0.00</span></div></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <h2 class="section-title" style="margin-top:0">Order Details</h2>
          <div class="vstack gap-3">
            <div class="card"><div class="card-body">
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o1"><label class="form-check-label" for="o1">ADVANCE ORDER FOR DINE IN</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o2"><label class="form-check-label" for="o2">PRE-ORDER</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o3"><label class="form-check-label" for="o3">PICKUP</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o4"><label class="form-check-label" for="o4">DELIVERY</label></div>
              <hr>
              <div class="mb-2">Schedule</div>
              <div class="row g-2">
                <div class="col-7"><input id="scheduleDate" type="date" class="form-control form-control-sm"></div>
                <div class="col-5"><input id="scheduleTime" type="time" class="form-control form-control-sm"></div>
              </div>
              <div class="mt-2">
                <label for="tableNumber" class="form-label small">Table # (for dine-in)</label>
                <input id="tableNumber" type="number" min="1" class="form-control form-control-sm" placeholder="e.g., 5">
              </div>
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="ecoTrackerToggle">
                <label class="form-check-label" for="ecoTrackerToggle">Use reusable eco cup</label>
              </div>
              <div class="small text-muted mt-1">Saved cups so far: <strong><span id="ecoCupsSavedCheckout">0</span></strong></div>
              <div class="d-grid mt-3">
                <button id="mysteryAddBtn" class="btn btn-outline-secondary btn-sm" type="button">Add Mystery Drink</button>
              </div>
            </div></div>
            <a href="store.html" class="btn btn-primary btn-lg">Continue Shopping</a>
          </div>
        </div>
      </div>
    </main>

    <div class="cart-bar">
      <div class="items"><i class="fa-solid fa-cart-shopping"></i> <span id="cartCount">0</span> items</div>
      <button class="checkout" id="placeOrder" style="cursor: pointer;">PLACE ORDER</button>
      <div class="total">₱ <span id="cartTotal">0.00</span></div>
    </div>

    <footer class="container pb-4 small text-muted">
      <div class="border-top pt-2">Demo only. Replace alert() with API calls (e.g., /orders).</div>
    </footer>

    <script src="checkout.js"></script>
  </body>
</html>
