<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Orders & Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h1 class="h3 mb-3">Admin</h1>
      <ul class="nav nav-tabs" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="orders-tab" data-bs-toggle="tab" data-bs-target="#orders" type="button" role="tab">Orders</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="products-tab" data-bs-toggle="tab" data-bs-target="#products" type="button" role="tab">Products</button>
        </li>
      </ul>
      <div class="tab-content border border-top-0 bg-white p-3" id="adminTabsContent">
        <div class="tab-pane fade show active" id="orders" role="tabpanel">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 m-0">Orders</h2>
            <button id="refreshOrders" class="btn btn-sm btn-outline-secondary">Refresh</button>
          </div>
          <div id="ordersList" class="vstack gap-2"></div>
        </div>
        <div class="tab-pane fade" id="products" role="tabpanel">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 m-0">Products</h2>
            <button id="newProduct" class="btn btn-sm btn-primary">New Product</button>
          </div>
          <div id="productsList" class="vstack gap-2"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
  </body>
  </html>
