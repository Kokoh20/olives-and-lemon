<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Orders</title>
    <link rel="icon" type="image/x-icon" href="assets/images/logo1-removebg-preview.png">
    <link rel="stylesheet" href="shop.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
      .status-badge { text-transform: uppercase; font-size: 12px; }
      .order-card { border-left: 4px solid #0d6efd; }
      .order-card.new { border-left-color: #0d6efd; }
      .order-card.preparing { border-left-color: #fd7e14; }
      .order-card.ready { border-left-color: #198754; }
      .order-card.completed { border-left-color: #6c757d; }
      .order-card.cancelled { border-left-color: #dc3545; }
      .order-actions .btn { min-width: 90px; }
      .order-item { font-size: 14px; }
      .small-muted { color: #6c757d; font-size: 12px; }
    </style>
  </head>
  <body>
    <header class="store-header">
      <div class="store-top container">
        <div class="brand">
          <img src="assets/images/mauiz_cafe-removebg-preview.png" alt="Logo"/>
          <div class="brand-text">
            <h1>Admin Console</h1>
            <p>Orders management</p>
          </div>
        </div>
        <div class="meta">
          <a href="store.html" class="btn btn-outline-light">Back to Store</a>
        </div>
      </div>
      <div class="canopy"></div>
      <div class="canopy canopy-alt"></div>
    </header>

    <main class="container" style="padding-bottom: 40px;">
      <div class="d-flex align-items-center gap-3 my-3">
        <h2 class="section-title m-0">Orders</h2>
        <div class="ms-auto input-group" style="max-width: 360px;">
          <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input id="searchOrders" type="text" class="form-control" placeholder="Search name / phone / id">
        </div>
      </div>

      <div class="mb-3">
        <div class="chip active" data-filter="all">All</div>
        <div class="chip" data-filter="new">New</div>
        <div class="chip" data-filter="preparing">Preparing</div>
        <div class="chip" data-filter="ready">Ready</div>
        <div class="chip" data-filter="completed">Completed</div>
        <div class="chip" data-filter="cancelled">Cancelled</div>
      </div>

      <div id="ordersList" class="vstack gap-3"></div>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
