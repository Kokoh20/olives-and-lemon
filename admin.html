<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Mauiz Cafe</title>
    <link rel="icon" type="image/x-icon" href="assets/images/logo1-removebg-preview.png">
    <link rel="stylesheet" href="shop.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <header class="store-header">
      <div class="store-top container">
        <div class="brand">
          <img src="assets/images/mauiz_cafe-removebg-preview.png" alt="Logo" />
          <div class="brand-text">
            <h1>Admin Dashboard</h1>
            <p>Mauiz Cafe</p>
          </div>
        </div>
        <div class="meta">
          <a href="store.html" class="btn btn-outline-light">Go to Store</a>
        </div>
      </div>
      <div class="canopy"></div>
      <div class="canopy canopy-alt"></div>
    </header>

    <main class="container py-4">
      <ul class="nav nav-tabs" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="orders-tab" data-bs-toggle="tab" data-bs-target="#orders" type="button" role="tab" aria-controls="orders" aria-selected="true">Orders</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="products-tab" data-bs-toggle="tab" data-bs-target="#products" type="button" role="tab" aria-controls="products" aria-selected="false">Products</button>
        </li>
      </ul>
      <div class="tab-content" id="adminTabsContent">
        <div class="tab-pane fade show active" id="orders" role="tabpanel" aria-labelledby="orders-tab">
          <div class="d-flex align-items-center my-3">
            <h2 class="me-auto">Orders</h2>
            <button id="refreshOrders" class="btn btn-outline-primary"><i class="fa-solid fa-rotate"></i> Refresh</button>
          </div>
          <div id="ordersList" class="vstack gap-3"></div>
        </div>
        <div class="tab-pane fade" id="products" role="tabpanel" aria-labelledby="products-tab">
          <div class="d-flex align-items-center my-3">
            <h2 class="me-auto">Products</h2>
            <button id="newProductBtn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New</button>
          </div>
          <div id="productsList" class="vstack gap-2"></div>
          <div class="card mt-3">
            <div class="card-body">
              <h5 class="card-title">Add / Edit Product</h5>
              <div class="row g-3">
                <div class="col-md-3">
                  <label class="form-label">ID (slug)</label>
                  <input type="text" id="p_id" class="form-control" placeholder="auto if blank" />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Name</label>
                  <input type="text" id="p_name" class="form-control" />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Price</label>
                  <input type="number" id="p_price" class="form-control" min="0" step="0.01" />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Category</label>
                  <input type="text" id="p_category" class="form-control" value="rice-bowl" />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Image</label>
                  <input type="text" id="p_image" class="form-control" placeholder="assets/images/..." />
                </div>
              </div>
              <div class="mt-3 d-flex gap-2">
                <button id="saveProduct" class="btn btn-success">Save</button>
                <button id="deleteProduct" class="btn btn-outline-danger">Delete</button>
                <button id="clearProduct" class="btn btn-outline-secondary">Clear</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
